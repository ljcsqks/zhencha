name: "area_search_5uav"
description: "500x500 area search with five UAVs, dense hazards, dynamic obstacle update, and broad priority coverage."

overrides:
  map:
    width_m: 500
    height_m: 500
    resolution_m: 10
  uav:
    count: 5
  simulation:
    max_steps: 460

map_features:
  obstacles:
    - id: "south_barrier"
      shape: "rectangle"
      frame: "world"
      x_m: 190
      y_m: 70
      width_m: 55
      height_m: 170
    - id: "north_barrier"
      shape: "rectangle"
      frame: "world"
      x_m: 290
      y_m: 275
      width_m: 50
      height_m: 150
  no_fly_zones:
    - id: "west_safety_ring"
      shape: "circle"
      frame: "world"
      center_x_m: 95
      center_y_m: 330
      radius_m: 32
    - id: "central_safety_ring"
      shape: "circle"
      frame: "world"
      center_x_m: 255
      center_y_m: 165
      radius_m: 35
    - id: "east_safety_ring"
      shape: "circle"
      frame: "world"
      center_x_m: 405
      center_y_m: 315
      radius_m: 28
  priority_zones:
    - id: "east_priority"
      shape: "rectangle"
      frame: "world"
      x_m: 355
      y_m: 85
      width_m: 85
      height_m: 80
      priority: 3.0
    - id: "north_priority"
      shape: "rectangle"
      frame: "world"
      x_m: 190
      y_m: 370
      width_m: 95
      height_m: 70
      priority: 3.0

uavs:
  - id: "uav_01"
    home_position: [0, 4]
    initial_position: [0, 4]
    battery: 1.0
  - id: "uav_02"
    home_position: [0, 14]
    initial_position: [0, 14]
    battery: 1.0
  - id: "uav_03"
    home_position: [0, 25]
    initial_position: [0, 25]
    battery: 1.0
  - id: "uav_04"
    home_position: [0, 36]
    initial_position: [0, 36]
    battery: 1.0
  - id: "uav_05"
    home_position: [0, 46]
    initial_position: [0, 46]
    battery: 1.0

events:
  - time_s: 115
    type: "MAP_UPDATE"
    data:
      operation: "SET_REGION"
      shape: "rectangle"
      frame: "grid"
      x: 15
      y: 22
      width: 6
      height: 6
      cell_type: "OBSTACLE"
