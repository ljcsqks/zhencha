name: "clustered_launch_3uav_dynamic_obstacle"
description: "Three clustered-launch UAVs receive a mid-route obstacle update to exercise dynamic route repair."

overrides:
  map:
    width_m: 500
    height_m: 500
    resolution_m: 10
  uav:
    count: 3
  simulation:
    max_steps: 720

map_features:
  obstacles:
    - {id: dynamic_static_block, shape: rectangle, frame: grid, x: 24, y: 9, width: 3, height: 8}
  no_fly_zones: []
  priority_zones:
    - {id: dynamic_priority, shape: rectangle, frame: grid, x: 36, y: 34, width: 8, height: 8, priority: 3.0}

uavs:
  - {id: uav_01, home_position: [0, 0], initial_position: [0, 0], battery: 1.0}
  - {id: uav_02, home_position: [1, 0], initial_position: [1, 0], battery: 1.0}
  - {id: uav_03, home_position: [0, 1], initial_position: [0, 1], battery: 1.0}

events:
  - id: "clustered_launch_mid_route_obstacle"
    time_s: 90.0
    type: "MAP_UPDATE"
    data:
      operation: "SET_REGION"
      shape: "rectangle"
      frame: "grid"
      x: 29
      y: 17
      width: 6
      height: 7
      cell_type: "OBSTACLE"
