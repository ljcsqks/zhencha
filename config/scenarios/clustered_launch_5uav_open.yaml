name: "clustered_launch_5uav_open"
description: "Five UAVs launch from one staging cluster into a large open area to exercise sector balance."

overrides:
  map:
    width_m: 500
    height_m: 500
    resolution_m: 10
  uav:
    count: 5
  simulation:
    max_steps: 620

map_features:
  obstacles: []
  no_fly_zones: []
  priority_zones:
    - {id: five_open_priority, shape: rectangle, frame: grid, x: 35, y: 34, width: 8, height: 8, priority: 3.0}

uavs:
  - {id: uav_01, home_position: [0, 0], initial_position: [0, 0], battery: 1.0}
  - {id: uav_02, home_position: [1, 0], initial_position: [1, 0], battery: 1.0}
  - {id: uav_03, home_position: [0, 1], initial_position: [0, 1], battery: 1.0}
  - {id: uav_04, home_position: [1, 1], initial_position: [1, 1], battery: 1.0}
  - {id: uav_05, home_position: [2, 0], initial_position: [2, 0], battery: 1.0}

events: []
