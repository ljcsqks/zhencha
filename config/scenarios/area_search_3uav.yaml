name: "area_search_3uav"
description: "500x500 area search with three UAVs, vertical obstacle, no-fly circle, priority region, and dynamic obstacle update."

overrides:
  map:
    width_m: 500
    height_m: 500
    resolution_m: 10
  uav:
    count: 3
  simulation:
    max_steps: 620

map_features:
  obstacles:
    - id: "warehouse_spine"
      shape: "rectangle"
      frame: "world"
      x_m: 210
      y_m: 90
      width_m: 50
      height_m: 260
  no_fly_zones:
    - id: "temporary_restricted_zone"
      shape: "circle"
      frame: "world"
      center_x_m: 120
      center_y_m: 180
      radius_m: 35
  priority_zones:
    - id: "incident_priority"
      shape: "rectangle"
      frame: "world"
      x_m: 335
      y_m: 310
      width_m: 95
      height_m: 80
      priority: 3.0

uavs:
  - id: "uav_01"
    home_position: [0, 6]
    initial_position: [0, 6]
    battery: 1.0
  - id: "uav_02"
    home_position: [0, 25]
    initial_position: [0, 25]
    battery: 1.0
  - id: "uav_03"
    home_position: [0, 44]
    initial_position: [0, 44]
    battery: 1.0

events:
  - time_s: 160
    type: "MAP_UPDATE"
    data:
      operation: "SET_REGION"
      shape: "rectangle"
      frame: "grid"
      x: 31
      y: 12
      width: 5
      height: 6
      cell_type: "OBSTACLE"
