name: "demo_dynamic_obstacle"
description: "DEMO: a runtime MAP_UPDATE adds an obstacle and triggers local replanning."

overrides:
  map:
    width_m: 500
    height_m: 500
    resolution_m: 10
  uav:
    count: 3
  simulation:
    max_steps: 650

map_features:
  obstacles:
    - id: "demo_static_block"
      shape: "rectangle"
      frame: "world"
      x_m: 210
      y_m: 120
      width_m: 50
      height_m: 220
  no_fly_zones:
    - id: "demo_no_fly"
      shape: "circle"
      frame: "world"
      center_x_m: 120
      center_y_m: 180
      radius_m: 30
  priority_zones:
    - id: "demo_priority"
      shape: "rectangle"
      frame: "world"
      x_m: 330
      y_m: 320
      width_m: 95
      height_m: 75
      priority: 3.0

uavs:
  - id: "uav_01"
    home_position: [0, 6]
    initial_position: [0, 6]
    battery: 1.0
  - id: "uav_02"
    home_position: [0, 25]
    initial_position: [0, 25]
    battery: 1.0
  - id: "uav_03"
    home_position: [0, 44]
    initial_position: [0, 44]
    battery: 1.0

events:
  - id: "demo_dynamic_obstacle_added"
    time_s: 40.0
    type: "MAP_UPDATE"
    data:
      operation: "SET_REGION"
      shape: "rectangle"
      frame: "grid"
      x: 31
      y: 12
      width: 5
      height: 6
      cell_type: "OBSTACLE"
