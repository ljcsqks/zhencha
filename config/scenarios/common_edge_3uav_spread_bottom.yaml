name: "common_edge_3uav_spread_bottom"
description: "Three UAVs staged along the same entry edge with enough spacing to avoid clustered-point detection."

overrides:
  map:
    width_m: 500
    height_m: 500
    resolution_m: 10
  uav:
    count: 3
  simulation:
    max_steps: 650

map_features:
  obstacles: []
  no_fly_zones: []
  priority_zones:
    - {id: bottom_priority, shape: rectangle, frame: grid, x: 34, y: 34, width: 8, height: 8, priority: 3.0}

uavs:
  - {id: uav_01, home_position: [4, 0], initial_position: [4, 0], battery: 1.0}
  - {id: uav_02, home_position: [22, 1], initial_position: [22, 1], battery: 1.0}
  - {id: uav_03, home_position: [40, 0], initial_position: [40, 0], battery: 1.0}

events: []
