name: "clustered_launch_3uav_sparse_obstacles"
description: "Three clustered-launch UAVs search a lightly obstructed 500x500 region."

overrides:
  map:
    width_m: 500
    height_m: 500
    resolution_m: 10
  uav:
    count: 3
  simulation:
    max_steps: 680

map_features:
  obstacles:
    - {id: sparse_block_a, shape: rectangle, frame: grid, x: 19, y: 8, width: 3, height: 8}
    - {id: sparse_block_b, shape: rectangle, frame: grid, x: 31, y: 28, width: 4, height: 6}
  no_fly_zones:
    - {id: sparse_no_fly, shape: circle, frame: grid, center_x: 14, center_y: 33, radius: 3}
  priority_zones:
    - {id: sparse_priority, shape: rectangle, frame: grid, x: 37, y: 35, width: 7, height: 7, priority: 3.0}

uavs:
  - {id: uav_01, home_position: [0, 0], initial_position: [0, 0], battery: 1.0}
  - {id: uav_02, home_position: [1, 0], initial_position: [1, 0], battery: 1.0}
  - {id: uav_03, home_position: [0, 1], initial_position: [0, 1], battery: 1.0}

events: []
