name: "dynamic_basic"
description: "动态响应场景模板：运行中可注入目标、地图更新和离线事件。"

overrides:
  map:
    width_m: 300
    height_m: 200
    resolution_m: 10
  uav:
    count: 3
  simulation:
    max_steps: 180

map_features:
  obstacles:
    - id: "building_001"
      shape: "rectangle"
      frame: "world"
      x_m: 120
      y_m: 40
      width_m: 40
      height_m: 120
  no_fly_zones: []
  priority_zones:
    - id: "incident_area"
      shape: "rectangle"
      frame: "world"
      x_m: 230
      y_m: 120
      width_m: 50
      height_m: 50
      priority: 3.0

uavs:
  - id: "uav_01"
    home_position: [0, 0]
    initial_position: [0, 0]
    battery: 1.0
  - id: "uav_02"
    home_position: [0, 10]
    initial_position: [0, 10]
    battery: 1.0
  - id: "uav_03"
    home_position: [0, 19]
    initial_position: [0, 19]
    battery: 1.0

events:
  - time_s: 5
    type: "TARGET_FOUND"
    source_uav_id: "uav_02"
    data:
      target_id: "target_001"
      position: {"x": 0, "y": 10}
      confidence: 0.9
      target_type: "person"

  - time_s: 30
    type: "MAP_UPDATE"
    data:
      operation: "SET_REGION"
      shape: "rectangle"
      frame: "grid"
      x: 8
      y: 8
      width: 3
      height: 4
      cell_type: "OBSTACLE"
