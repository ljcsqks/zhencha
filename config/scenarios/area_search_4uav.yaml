name: "area_search_4uav"
description: "500x500 area search with four UAVs, mixed obstacles, multiple no-fly zones, and priority-first coverage."

overrides:
  map:
    width_m: 500
    height_m: 500
    resolution_m: 10
  uav:
    count: 4
  simulation:
    max_steps: 520

map_features:
  obstacles:
    - id: "central_tower"
      shape: "rectangle"
      frame: "world"
      x_m: 215
      y_m: 80
      width_m: 55
      height_m: 230
    - id: "north_service_block"
      shape: "rectangle"
      frame: "world"
      x_m: 105
      y_m: 365
      width_m: 85
      height_m: 45
  no_fly_zones:
    - id: "west_restricted"
      shape: "circle"
      frame: "world"
      center_x_m: 105
      center_y_m: 175
      radius_m: 32
    - id: "east_restricted"
      shape: "circle"
      frame: "world"
      center_x_m: 360
      center_y_m: 135
      radius_m: 36
  priority_zones:
    - id: "north_priority"
      shape: "rectangle"
      frame: "world"
      x_m: 330
      y_m: 335
      width_m: 95
      height_m: 75
      priority: 3.0

uavs:
  - id: "uav_01"
    home_position: [0, 5]
    initial_position: [0, 5]
    battery: 1.0
  - id: "uav_02"
    home_position: [0, 17]
    initial_position: [0, 17]
    battery: 1.0
  - id: "uav_03"
    home_position: [0, 32]
    initial_position: [0, 32]
    battery: 1.0
  - id: "uav_04"
    home_position: [0, 45]
    initial_position: [0, 45]
    battery: 1.0

events:
  - time_s: 130
    type: "MAP_UPDATE"
    data:
      operation: "SET_REGION"
      shape: "rectangle"
      frame: "grid"
      x: 27
      y: 24
      width: 5
      height: 5
      cell_type: "OBSTACLE"
