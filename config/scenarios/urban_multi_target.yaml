name: "urban_multi_target"
description: "城市块状障碍与四目标场景：圆形禁飞区分割搜索空间，多个无人机依次发现目标。"

overrides:
  map:
    width_m: 420
    height_m: 260
    resolution_m: 10
  uav:
    count: 4
  simulation:
    max_steps: 420

map_features:
  obstacles:
    - id: "office_block_a"
      shape: "rectangle"
      frame: "world"
      x_m: 120
      y_m: 30
      width_m: 40
      height_m: 95
    - id: "office_block_b"
      shape: "rectangle"
      frame: "world"
      x_m: 210
      y_m: 130
      width_m: 50
      height_m: 100
    - id: "station_block"
      shape: "rectangle"
      frame: "world"
      x_m: 320
      y_m: 55
      width_m: 35
      height_m: 90
  no_fly_zones:
    - id: "school_zone"
      shape: "circle"
      frame: "world"
      center_x_m: 85
      center_y_m: 75
      radius_m: 25
    - id: "hospital_zone"
      shape: "circle"
      frame: "world"
      center_x_m: 190
      center_y_m: 70
      radius_m: 20
    - id: "command_post_zone"
      shape: "circle"
      frame: "world"
      center_x_m: 305
      center_y_m: 205
      radius_m: 30
  priority_zones:
    - id: "north_priority"
      shape: "rectangle"
      frame: "world"
      x_m: 270
      y_m: 160
      width_m: 90
      height_m: 55
      priority: 3.0
    - id: "south_priority"
      shape: "rectangle"
      frame: "world"
      x_m: 40
      y_m: 170
      width_m: 70
      height_m: 50
      priority: 2.5

uavs:
  - id: "uav_01"
    home_position: [0, 0]
    initial_position: [0, 0]
    battery: 1.0
  - id: "uav_02"
    home_position: [0, 8]
    initial_position: [0, 8]
    battery: 1.0
  - id: "uav_03"
    home_position: [0, 17]
    initial_position: [0, 17]
    battery: 1.0
  - id: "uav_04"
    home_position: [0, 25]
    initial_position: [0, 25]
    battery: 1.0

events:
  - time_s: 10
    type: "TARGET_FOUND"
    source_uav_id: "uav_01"
    data:
      target_id: "urban_target_01"
      position: {"x": 5, "y": 20}
      confidence: 0.84
      target_type: "person"
  - time_s: 35
    type: "TARGET_FOUND"
    source_uav_id: "uav_03"
    data:
      target_id: "urban_target_02"
      position: {"x": 18, "y": 19}
      confidence: 0.89
      target_type: "person"
  - time_s: 62
    type: "TARGET_FOUND"
    source_uav_id: "uav_04"
    data:
      target_id: "urban_target_03"
      position: {"x": 37, "y": 22}
      confidence: 0.92
      target_type: "vehicle"
  - time_s: 96
    type: "TARGET_FOUND"
    source_uav_id: "uav_02"
    data:
      target_id: "urban_target_04"
      position: {"x": 40, "y": 6}
      confidence: 0.87
      target_type: "person"
