name: "building_modeling_during_search"
description: "Facade modeling request arrives after search has started and resumes interrupted search."

overrides:
  map:
    width_m: 500
    height_m: 500
    resolution_m: 10
  uav:
    count: 3
  simulation:
    max_steps: 260

uavs:
  - id: "uav_01"
    home_position: [0, 6]
    initial_position: [0, 6]
    battery: 1.0
  - id: "uav_02"
    home_position: [0, 25]
    initial_position: [0, 25]
    battery: 1.0
  - id: "uav_03"
    home_position: [0, 44]
    initial_position: [0, 44]
    battery: 1.0

events:
  - id: "building_modeling_during_search_request"
    time_s: 5
    type: "BUILDING_MODEL_REQUEST"
    priority: "CRITICAL"
    data:
      building_id: "building_demo_c"
      footprint:
        - {x: 30, y: 10}
        - {x: 38, y: 10}
        - {x: 38, y: 18}
        - {x: 30, y: 18}
      uav_count: 2
      standoff_cells: 3
      laps: 1
      resume_search_after: true
