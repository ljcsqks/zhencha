name: "stress_target_confirm_mid_search"
description: "STRESS: target confirmation injected mid-search to measure coverage interruption cost."

overrides:
  map:
    width_m: 500
    height_m: 500
    resolution_m: 10
  uav:
    count: 3
  simulation:
    max_steps: 820

map_features:
  obstacles:
    - {id: target_mid_block, shape: rectangle, frame: grid, x: 22, y: 12, width: 5, height: 24}
  no_fly_zones:
    - {id: target_mid_no_fly, shape: circle, frame: grid, center_x: 12, center_y: 36, radius: 3}
  priority_zones:
    - {id: target_mid_priority, shape: rectangle, frame: grid, x: 34, y: 8, width: 9, height: 7, priority: 3.0}

uavs:
  - {id: uav_01, home_position: [0, 6], initial_position: [0, 6], battery: 1.0}
  - {id: uav_02, home_position: [0, 25], initial_position: [0, 25], battery: 1.0}
  - {id: uav_03, home_position: [0, 44], initial_position: [0, 44], battery: 1.0}

events:
  - id: "stress_mid_search_target"
    time_s: 120.0
    type: "TARGET_FOUND"
    data:
      target_id: "stress_mid_target"
      position: {x: 34, y: 28}
      confidence: 0.88
      target_type: "unknown"
      orbit_radius_cells: 2
      orbit_laps: 1
      dwell_s: 1.0
