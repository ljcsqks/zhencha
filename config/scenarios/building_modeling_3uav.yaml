name: "building_modeling_3uav"
description: "Three UAV facade modeling request with perimeter split across helpers."

overrides:
  map:
    width_m: 500
    height_m: 500
    resolution_m: 10
  uav:
    count: 3
  simulation:
    max_steps: 220

uavs:
  - id: "uav_01"
    home_position: [4, 8]
    initial_position: [4, 8]
    battery: 1.0
  - id: "uav_02"
    home_position: [4, 24]
    initial_position: [4, 24]
    battery: 1.0
  - id: "uav_03"
    home_position: [4, 40]
    initial_position: [4, 40]
    battery: 1.0

events:
  - id: "building_modeling_3uav_request"
    time_s: 0
    type: "BUILDING_MODEL_REQUEST"
    priority: "CRITICAL"
    data:
      building_id: "building_demo_b"
      footprint:
        - {x: 28, y: 14}
        - {x: 38, y: 14}
        - {x: 38, y: 24}
        - {x: 28, y: 24}
      uav_count: 3
      standoff_cells: 3
      laps: 1
      resume_search_after: true
