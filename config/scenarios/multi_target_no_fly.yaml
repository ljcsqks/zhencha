name: "multi_target_no_fly"
description: "三目标动态搜索场景：多个圆形禁飞区，不同无人机在搜索中发现目标并盘旋确认。"

overrides:
  map:
    width_m: 360
    height_m: 240
    resolution_m: 10
  uav:
    count: 4
  simulation:
    max_steps: 220

map_features:
  obstacles:
    - id: "warehouse_block"
      shape: "rectangle"
      frame: "world"
      x_m: 150
      y_m: 50
      width_m: 40
      height_m: 110
  no_fly_zones:
    - id: "fuel_tank_safety"
      shape: "circle"
      frame: "world"
      center_x_m: 90
      center_y_m: 160
      radius_m: 25
    - id: "medical_landing_zone"
      shape: "circle"
      frame: "world"
      center_x_m: 250
      center_y_m: 80
      radius_m: 30
    - id: "temporary_restricted_airspace"
      shape: "circle"
      frame: "world"
      center_x_m: 285
      center_y_m: 175
      radius_m: 20
  priority_zones:
    - id: "incident_core"
      shape: "rectangle"
      frame: "world"
      x_m: 245
      y_m: 135
      width_m: 70
      height_m: 55
      priority: 3.0

uavs:
  - id: "uav_01"
    home_position: [0, 0]
    initial_position: [0, 0]
    battery: 1.0
  - id: "uav_02"
    home_position: [0, 8]
    initial_position: [0, 8]
    battery: 1.0
  - id: "uav_03"
    home_position: [0, 16]
    initial_position: [0, 16]
    battery: 1.0
  - id: "uav_04"
    home_position: [0, 23]
    initial_position: [0, 23]
    battery: 1.0

events:
  - time_s: 12
    type: "TARGET_FOUND"
    source_uav_id: "uav_02"
    data:
      target_id: "target_alpha"
      position: {"x": 6, "y": 18}
      confidence: 0.88
      target_type: "person"
  - time_s: 38
    type: "TARGET_FOUND"
    source_uav_id: "uav_04"
    data:
      target_id: "target_bravo"
      position: {"x": 28, "y": 20}
      confidence: 0.91
      target_type: "vehicle"
  - time_s: 72
    type: "TARGET_FOUND"
    source_uav_id: "uav_01"
    data:
      target_id: "target_charlie"
      position: {"x": 31, "y": 5}
      confidence: 0.86
      target_type: "person"
