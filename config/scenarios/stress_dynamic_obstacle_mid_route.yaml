name: "stress_dynamic_obstacle_mid_route"
description: "STRESS: obstacle inserted while UAVs are following long paths to exercise local replanning diagnostics."

overrides:
  map:
    width_m: 500
    height_m: 500
    resolution_m: 10
  uav:
    count: 3
  simulation:
    max_steps: 780

map_features:
  obstacles:
    - {id: mid_route_static, shape: rectangle, frame: grid, x: 22, y: 8, width: 5, height: 18}
  no_fly_zones:
    - {id: mid_route_no_fly, shape: circle, frame: grid, center_x: 14, center_y: 35, radius: 3}
  priority_zones:
    - {id: mid_route_priority, shape: rectangle, frame: grid, x: 35, y: 35, width: 8, height: 7, priority: 3.0}

uavs:
  - {id: uav_01, home_position: [0, 6], initial_position: [0, 6], battery: 1.0}
  - {id: uav_02, home_position: [0, 25], initial_position: [0, 25], battery: 1.0}
  - {id: uav_03, home_position: [0, 44], initial_position: [0, 44], battery: 1.0}

events:
  - id: "stress_mid_route_obstacle"
    time_s: 90.0
    type: "MAP_UPDATE"
    data:
      operation: "SET_REGION"
      shape: "rectangle"
      frame: "grid"
      x: 30
      y: 18
      width: 6
      height: 7
      cell_type: "OBSTACLE"
