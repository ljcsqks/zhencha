name: "area_search_1uav"
description: "500x500 area search baseline with one UAV, one priority region, static obstacles, and a runtime obstacle update."

overrides:
  map:
    width_m: 500
    height_m: 500
    resolution_m: 10
  uav:
    count: 1
  simulation:
    max_steps: 1100

map_features:
  obstacles:
    - id: "central_storage"
      shape: "rectangle"
      frame: "world"
      x_m: 210
      y_m: 165
      width_m: 55
      height_m: 120
  no_fly_zones: []
  priority_zones:
    - id: "east_priority_block"
      shape: "rectangle"
      frame: "world"
      x_m: 335
      y_m: 330
      width_m: 80
      height_m: 70
      priority: 3.0

uavs:
  - id: "uav_01"
    home_position: [0, 0]
    initial_position: [0, 0]
    battery: 1.0

events:
  - time_s: 220
    type: "MAP_UPDATE"
    data:
      operation: "SET_REGION"
      shape: "rectangle"
      frame: "grid"
      x: 10
      y: 34
      width: 5
      height: 4
      cell_type: "OBSTACLE"
